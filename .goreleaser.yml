version: 2

project_name: pfix

before:
  hooks:
    - go mod tidy

builds:
  - id: pfix
    main: .
    binary: pfix
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w
      - -X github.com/a68366/pfix-cli/internal/buildinfo.Version={{.Version}}
      - -X github.com/a68366/pfix-cli/internal/buildinfo.Commit={{.Commit}}
      - -X github.com/a68366/pfix-cli/internal/buildinfo.Date={{.Date}}

archives:
  - id: pfix
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE
      - README.md

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  draft: false
